name: justin-os-surface
description: Surface Pro 7 variant with KDE and linux-surface kernel
base-image: ghcr.io/ublue-os/silverblue-main
image-version: 43

modules:
  # Copy system files and home directory templates
  - type: files
    files:
      - source: system
        destination: /

  # Use inherited negativo17 multimedia repos when present; otherwise install RPM Fusion
  - type: script
    scripts:
      - install-rpmfusion-release.sh

  # Seed capture groups used by Wireshark/tcpdump-style package metadata.
  - type: script
    scripts:
      - ensure-capture-groups.sh

  # Import shared modules
  - from-file: packages-surface.yml
  - from-file: surface-flatpaks.yml

  # Shared Microsoft font installation and shell configuration sequence
  - from-file: shared-fonts-shell.yml

  # Surface kernel overrides (Silverblue guidance)
  - type: script
    scripts:
      - install-linux-surface-override.sh

  # Enable services
  - type: systemd
    system:
      enabled:
        - earlyoom.service
        - thermald.service
      masked:
        - systemd-oomd.service

  - type: signing
